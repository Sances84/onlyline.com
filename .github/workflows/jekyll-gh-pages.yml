# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # СНАЧАЛА СКАЧИВАЕМ КОД

      - name: Open the door (Setup SSH)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          # Сюда вставляй имя секрета, который ты создал
          ssh-private-key: ${{ secrets.ssh-for-env }}

      - name: Unzip and Push
        run: |
          # 1. Принудительно говорим гиту использовать SSH
          git remote set-url origin git@github.com:${{ github.repository }}.git
          
          # 2. Твой unzip
          for f in assets/*.zip; do unzip -o -j "$f" -d assets/; done
          
          # 3. Пушим результат
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@://github.com"
          git add assets/
          git commit -m "Door opened, assets unzipped" || echo "No changes"
          git push origin main

      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
